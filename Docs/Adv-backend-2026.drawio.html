;/span&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;p&amp;gt;Синяя стрелка используется для описания работы компонентов.&amp;lt;/p&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font style=&amp;quot;color: light-dark(rgb(0, 0, 0), rgb(153, 153, 255));&amp;quot;&amp;gt;P.s я тут кучу текста написал, надеюсь это не скажется негативно на результате оценивания. Просто надо было описать некоторые процессы, чтобы обосновать то или иное решение в диаграмме.&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;230\&quot; width=\&quot;450\&quot; x=\&quot;40\&quot; y=\&quot;-610\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;object placeholders=\&quot;1\&quot; c4Name=\&quot;Administration\&quot; c4Type=\&quot;SystemScopeBoundary\&quot; c4Application=\&quot;Context\&quot; label=\&quot;&amp;lt;font style=&amp;quot;font-size: 16px&amp;quot;&amp;gt;&amp;lt;b&amp;gt;&amp;lt;div style=&amp;quot;text-align: left&amp;quot;&amp;gt;%c4Name%&amp;lt;/div&amp;gt;&amp;lt;/b&amp;gt;&amp;lt;/font&amp;gt;&amp;lt;div style=&amp;quot;text-align: left&amp;quot;&amp;gt;[%c4Application%]&amp;lt;/div&amp;gt;\&quot; id=\&quot;BLs82FYHlgh4C1rqwASp-7\&quot;&gt;\n          &lt;mxCell parent=\&quot;1\&quot; style=\&quot;rounded=1;fontSize=11;whiteSpace=wrap;html=1;dashed=1;arcSize=20;fillColor=none;strokeColor=light-dark(#FF0000,#FF0000);fontColor=#333333;labelBackgroundColor=none;align=left;verticalAlign=bottom;labelBorderColor=none;spacingTop=0;spacing=10;dashPattern=8 4;metaEdit=1;rotatable=0;perimeter=rectanglePerimeter;noLabel=0;labelPadding=0;allowArrows=0;connectable=0;expand=0;recursiveResize=0;editable=1;pointerEvents=0;absoluteArcSize=1;points=[[0.25,0,0],[0.5,0,0],[0.75,0,0],[1,0.25,0],[1,0.5,0],[1,0.75,0],[0.75,1,0],[0.5,1,0],[0.25,1,0],[0,0.75,0],[0,0.5,0],[0,0.25,0]];\&quot; vertex=\&quot;1\&quot;&gt;\n            &lt;mxGeometry height=\&quot;210\&quot; width=\&quot;310\&quot; x=\&quot;510\&quot; y=\&quot;-380\&quot; as=\&quot; Color=#157315;noJump=1;\&quot;&gt;\n          &lt;mxGeometry relative=\&quot;1\&quot; as=\&quot;geometry\&quot;&gt;\n            &lt;mxPoint x=\&quot;1140\&quot; y=\&quot;57.82758620689651\&quot; as=\&quot;targetPoint\&quot; /&gt;\n          &lt;/mxGeometry&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;fSkRwiXgnxql4y6DxWEU-11\&quot; edge=\&quot;1\&quot; parent=\&quot;1\&quot; source=\&quot;BLs82FYHlgh4C1rqwASp-9\&quot; style=\&quot;edgeStyle=orthogonalEdgeStyle;rounded=0;orthogonalLoop=1;jettySize=auto;html=1;exitX=0;exitY=0.75;exitDx=0;exitDy=0;jumpStyle=gap;fillColor=#008a00;strokeColor=#157315;noJump=1;\&quot;&gt;\n          &lt;mxGeometry relative=\&quot;1\&quot; as=\&quot;geometry\&quot;&gt;\n            &lt;mxPoint x=\&quot;1080\&quot; y=\&quot;92.31034482758628\&quot; as=\&quot;targetPoint\&quot; /&gt;\n          &lt;/mxGeometry&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;BLs82FYHlgh4C1rqwASp-9\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;whiteSpace=wrap;strokeColor=default;fillColor=none;align=center;verticalAlign=middle;rounded=0;\&quot; value=\&quot;Тут General API будет работать с локальным справочником синхронно, чтобы получать актуальные данные. Также у Admission API есть Consumer для Dictionary Bus и он будет обновлять локальный кеш, который будет использоваться для fallback (unavailable Applicant Dictionary API)\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;70\&quot; width=\&quot;450\&quot; x=\&quot;1190\&quot; y=\&quot;40\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;BLs82FYHlgh4C1rqwASp-20\&quot; edge=\&quot;1\&quot; parent=\&quot;1\&quot; source=\&quot;BLs82FYHlgh4C1rqwASp-10\&quot; style=\&quot;edgeStyle=orthogonalEdgeStyle;rounded=0;orthogonalLoop=1;jettySize=auto;html=1;fillColor=#008a00;strokeColor=#157315;jumpStyle=gap;noJump=1;\&quot;&gt;\n          &lt;mxGeometry relative=\&quot;1\&quot; as=\&quot;geometry\&quot;&gt;\n uot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;190\&quot; width=\&quot;660\&quot; x=\&quot;3569.84\&quot; y=\&quot;650\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;C7bqShlFMDGIPzrauiy_-50\&quot; edge=\&quot;1\&quot; parent=\&quot;1\&quot; source=\&quot;C7bqShlFMDGIPzrauiy_-46\&quot; style=\&quot;edgeStyle=orthogonalEdgeStyle;rounded=0;orthogonalLoop=1;jettySize=auto;html=1;exitX=0.25;exitY=0;exitDx=0;exitDy=0;fillColor=#0050ef;strokeColor=#001DBC;\&quot;&gt;\n          &lt;mxGeometry relative=\&quot;1\&quot; as=\&quot;geometry\&quot;&gt;\n            &lt;Array as=\&quot;points\&quot;&gt;\n              &lt;mxPoint x=\&quot;3734.84\&quot; y=\&quot;620\&quot; /&gt;\n              &lt;mxPoint x=\&quot;3299.84\&quot; y=\&quot;620\&quot; /&gt;\n            &lt;/Array&gt;\n            &lt;mxPoint x=\&quot;3599.84\&quot; y=\&quot;670\&quot; as=\&quot;sourcePoint\&quot; /&gt;\n            &lt;mxPoint x=\&quot;3299.84\&quot; y=\&quot;580\&quot; as=\&quot;targetPoint\&quot; /&gt;\n          &lt;/mxGeometry&gt;\n        &lt;/mxCell&gt;\n        &lt;object placeholders=\&quot;1\&quot; c4Type=\&quot;Relationship\&quot; id=\&quot;C7bqShlFMDGIPzrauiy_-51\&quot;&gt;\n          &lt;mxCell edge=\&quot;1\&quot; parent=\&quot;1\&quot; source=\&quot;kWKTaswxP25WAeezaNYC-6\&quot; style=\&quot;endArrow=blockThin;html=1;fontSize=10;fontColor=#404040;strokeWidth=1;endFill=1;strokeColor=light-dark(#FF00F7,#FF00F7);elbow=vertical;metaEdit=1;endSize=14;startSize=14;jumpStyle=arc;jumpSize=16;rounded=0;edgeStyle=orthogonalEdgeStyle;entryX=1;entryY=0.25;entryDx=0;entryDy=0;entryPerimeter=0;exitX=1;exitY=0.75;exitDx=0;exitDy=0;exitPerimeter=0;\&quot; target=\&quot;C7bqShlFMDGIPzrauiy_-40\&quot;&gt;\n            &lt;mxGeometry relative=\&quot;1\&quot; width=\&quot;240\&quot; as=\&quot;geometry\&quot;&gt;\n              &lt;Array as=\&quot;points\&quot;&gt;\n                &lt;mxPoint x=\&quot;3399.84\&quot; y=\&quot;-50\&quot; /&gt;\n одход CQS (&amp;lt;span class=&amp;quot;Yjhzub&amp;quot; data-sfc-cb=&amp;quot;&amp;quot; style=&amp;quot;font-family: &amp;amp;quot;Google Sans&amp;amp;quot;, Arial, sans-serif;&amp;quot;&amp;gt;&amp;lt;font style=&amp;quot;color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;Command-Query Separation&amp;lt;/font&amp;gt;&amp;lt;/span&amp;gt;).&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;&amp;lt;span style=&amp;quot;white-space: pre;&amp;quot;&amp;gt;&amp;#x9;&amp;lt;/span&amp;gt;Будет использоваться библиотека Mediator, ну или его аналог, чтобы под каждую задачу была своя команда &amp;lt;span style=&amp;quot;white-space: pre;&amp;quot;&amp;gt;&amp;#x9;&amp;lt;/span&amp;gt;(CreateUserCommand, наприер).&amp;lt;br&amp;gt;&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;3. Абстракции для взаимодействия с компонентами внешней системы. То есть будет, например, интерфейс&amp;amp;nbsp; IMailPublisher с методом &amp;lt;span style=&amp;quot;white-space: pre;&amp;quot;&amp;gt;&amp;#x9;&amp;lt;/span&amp;gt;SendMail(MailDto dto), который будет использовать как абстракция для отправки писем внутри Admission.Application, а из-за того что Admission &amp;lt;span style=&amp;quot;white-space: pre;&amp;quot;&amp;gt;&amp;#x9;&amp;lt;/span&amp;gt;API всё это свяжет, то при вызове SendMail() внутри Admission.Application, Mail Event Publisher отправит ивет в Mail Bus, потому что&amp;amp;nbsp;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;Mail Event &amp;lt;span style=&amp;quot;white-space: pre;&amp;quot;&amp;gt;&amp;#x9;&amp;lt;/span&amp;gt;Publisher содержит&amp;amp;nbsp;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;имплементацию IMailPublisher.&amp;lt;/span&amp;gt;&amp;lt;/div&amp;gt;&amp;lt;/div&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n
