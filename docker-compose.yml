services:
  dictionary:
    container_name: ${DICTIONARY_CONTAINER_NAME}
    restart: unless-stopped
    build:
      context: .
      dockerfile: src/Dictionary/Dockerfile
    ports:
      - "${DICTIONARY_HOST_PORT}:${DICTIONARY_CONTAINER_PORT}"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:${DICTIONARY_CONTAINER_PORT}
      ConnectionStrings__Dictionary: ${DICTIONARY_CONNECTION_STRING}
      MessagingParams__Host: ${RABBITMQ_HOST}
      MessagingParams__Port: ${RABBITMQ_PORT}
      MessagingParams__User: ${RABBITMQ_DEFAULT_USER}
      MessagingParams__Password: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://127.0.0.1:${DICTIONARY_CONTAINER_PORT}/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      rabbit-mq:
        condition: service_healthy
      postgres:
        condition: service_healthy
  
  auth:
    container_name: ${AUTH_CONTAINER_NAME}
    restart: unless-stopped
    build:
      context: .
      dockerfile: src/Auth/Dockerfile
    ports:
      - "${AUTH_HOST_PORT}:${AUTH_CONTAINER_PORT}"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:${AUTH_CONTAINER_PORT}
      ConnectionStrings__Auth: ${AUTH_CONNECTION_STRING}
      Auth__Issuer: ${AUTH_ISSUER}
      Auth__Audience: ${AUTH_AUDIENCE}
      Security__TokenPepper: ${AUTH_TOKEN_PEPPER}
      MessagingParams__Host: ${RABBITMQ_HOST}
      MessagingParams__Port: ${RABBITMQ_PORT}
      MessagingParams__User: ${RABBITMQ_DEFAULT_USER}
      MessagingParams__Password: ${RABBITMQ_DEFAULT_PASS}
      AdminSeed__Enabled: ${AUTH_ADMIN_SEED_ENABLED}
      AdminSeed__Email: ${AUTH_ADMIN_SEED_EMAIL}
      AdminSeed__Password: ${AUTH_ADMIN_SEED_PASSWORD}
      AuthDebug__ExposeActionTokens: ${AUTH_DEBUG_EXPOSE_ACTION_TOKENS}
    volumes:
      - auth_dataprotection_keys:/root/.aspnet/DataProtection-Keys
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:${AUTH_CONTAINER_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      rabbit-mq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  mail-manager:
    container_name: ${MAIL_MANAGER_CONTAINER_NAME}
    restart: unless-stopped
    build:
      context: .
      dockerfile: src/Mail/Dockerfile
    ports:
      - "${MAIL_MANAGER_HOST_PORT}:${MAIL_MANAGER_CONTAINER_PORT}"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:${MAIL_MANAGER_CONTAINER_PORT}
      MessagingParams__Host: ${RABBITMQ_HOST}
      MessagingParams__Port: ${RABBITMQ_PORT}
      MessagingParams__User: ${RABBITMQ_DEFAULT_USER}
      MessagingParams__Password: ${RABBITMQ_DEFAULT_PASS}
      SmtpOptions__Host: ${MAILDEV_HOST}
      SmtpOptions__Port: ${MAILDEV_SMTP_PORT}
      SmtpOptions__HostName: ${SMTP_HOST_NAME}
      SmtpOptions__HostEmail: ${SMTP_HOST_EMAIL}
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING}
      ConnectionStrings__MailInbox: ${MAIL_INBOX_CONNECTION_STRING}
      Redis__InstanceName: ${REDIS_INSTANCE_NAME}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:${MAIL_MANAGER_CONTAINER_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      rabbit-mq:
        condition: service_healthy
      mail-dev:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  s3-storage:
    image: quay.io/minio/minio:latest
    container_name: ${MINIO_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  rabbit-mq:
    image: rabbitmq:3-management
    container_name: ${RABBITMQ_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  mail-dev:
    image: maildev/maildev:latest
    container_name: ${MAILDEV_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${MAILDEV_SMTP_PORT}:1025"
      - "${MAILDEV_WEB_PORT}:1080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:1080/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:latest
    container_name: ${REDIS_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - redis_data:/data

  redis-insight:
    image: redis/redisinsight:latest
    container_name: ${REDIS_INSIGHT_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${REDIS_INSIGHT_PORT}:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis

  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG}
    container_name: ${POSTGRES_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data_pg18:/var/lib/postgresql
      - ./postgres-configs:/docker-entrypoint-initdb.d

volumes:
  auth_dataprotection_keys:
  minio_data:
  rabbitmq_data:
  redis_data:
  redisinsight_data:
  postgres_data_pg18:
